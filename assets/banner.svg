<svg width="900" height="320" viewBox="0 0 900 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Cast-bronze frame: diagonal sheen across the metal -->
    <linearGradient id="frame" x1="0" y1="0" x2="900" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EDC98E"/>
      <stop offset="0.5" stop-color="#C0873F"/>
      <stop offset="1" stop-color="#794E1B"/>
    </linearGradient>
    <!-- Deep warm panel background -->
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E0A05"/>
      <stop offset="0.45" stop-color="#1A120A"/>
      <stop offset="1" stop-color="#241A0E"/>
    </linearGradient>
    <!-- Recessed inner panel (emblem) -->
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A1F11"/>
      <stop offset="1" stop-color="#160F08"/>
    </linearGradient>
    <!-- Embossed bronze: bright highlight into deeper bronze -->
    <linearGradient id="mono" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCE6BE"/>
      <stop offset="0.5" stop-color="#E0A559"/>
      <stop offset="1" stop-color="#A86C2C"/>
    </linearGradient>
    <!-- Verdigris patina inlay -->
    <linearGradient id="patina" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6FD0C1"/>
      <stop offset="1" stop-color="#36A096"/>
    </linearGradient>
    <!-- Glossy top sheen -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.42"/>
      <stop offset="0.6" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Metallic wordmark: cream into light bronze -->
    <linearGradient id="word" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBF3E4"/>
      <stop offset="1" stop-color="#E2C79A"/>
    </linearGradient>
    <!-- Warm light pooling behind the emblem -->
    <radialGradient id="bronzeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#C0873F" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#C0873F" stop-opacity="0"/>
    </radialGradient>
    <!-- Cool patina light pooling behind the mechanism -->
    <radialGradient id="patinaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#36A096" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#36A096" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Cast-bronze frame + recessed panel -->
  <rect x="0" y="0" width="900" height="320" rx="22" fill="url(#frame)"/>
  <rect x="6" y="6" width="888" height="308" rx="17" fill="url(#bg)"/>

  <!-- Ambient light pools -->
  <ellipse cx="150" cy="160" rx="230" ry="170" fill="url(#bronzeGlow)" filter="url(#soft)"/>
  <ellipse cx="720" cy="160" rx="200" ry="160" fill="url(#patinaGlow)" filter="url(#soft)"/>

  <!-- ============ Right: bronze mechanism + modular network ============ -->
  <g transform="translate(720 160)">
    <!-- Connection filaments from the core out to module tiles -->
    <g stroke="#A86C2C" stroke-width="1" opacity="0.4">
      <line x1="0" y1="0" x2="100" y2="-80"/>
      <line x1="0" y1="0" x2="130" y2="-10"/>
      <line x1="0" y1="0" x2="115" y2="65"/>
      <line x1="0" y1="0" x2="50" y2="90"/>
      <line x1="0" y1="0" x2="-80" y2="75"/>
      <line x1="0" y1="0" x2="-100" y2="-40"/>
      <line x1="0" y1="0" x2="-60" y2="-90"/>
      <line x1="0" y1="0" x2="40" y2="-100"/>
    </g>

    <!-- Clockwork dial: concentric bronze rings + tick ring -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#frame)" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="48" fill="none" stroke="#A86C2C" stroke-width="1" opacity="0.45" stroke-dasharray="2 8"/>
    <circle cx="0" cy="0" r="34" fill="none" stroke="url(#mono)" stroke-width="1.5" opacity="0.6"/>
    <!-- Verdigris core with embossed monogram tick -->
    <circle cx="0" cy="0" r="20" fill="url(#patina)" opacity="0.9"/>
    <circle cx="0" cy="0" r="20" fill="url(#gloss)"/>
    <g fill="#0E0A05" opacity="0.55">
      <rect x="-9" y="-7" width="18" height="4" rx="1.2"/>
      <rect x="-2" y="-7" width="4" height="15" rx="1.2"/>
    </g>

    <!-- Module tiles (the modular packages) -->
    <g>
      <g transform="translate(100 -80)"><rect x="-11" y="-11" width="22" height="22" rx="5" fill="url(#mono)"/><rect x="-11" y="-11" width="22" height="11" rx="5" fill="url(#gloss)"/><circle cx="0" cy="0" r="3" fill="#36A096"/></g>
      <g transform="translate(130 -10)"><rect x="-9" y="-9" width="18" height="18" rx="4" fill="url(#mono)"/><rect x="-9" y="-9" width="18" height="9" rx="4" fill="url(#gloss)"/></g>
      <g transform="translate(115 65)"><rect x="-10" y="-10" width="20" height="20" rx="5" fill="url(#mono)"/><rect x="-10" y="-10" width="20" height="10" rx="5" fill="url(#gloss)"/><circle cx="0" cy="0" r="2.6" fill="#36A096"/></g>
      <g transform="translate(50 90)"><rect x="-8" y="-8" width="16" height="16" rx="4" fill="url(#mono)"/><rect x="-8" y="-8" width="16" height="8" rx="4" fill="url(#gloss)"/></g>
      <g transform="translate(-80 75)"><rect x="-10" y="-10" width="20" height="20" rx="5" fill="url(#mono)"/><rect x="-10" y="-10" width="20" height="10" rx="5" fill="url(#gloss)"/><circle cx="0" cy="0" r="2.6" fill="#36A096"/></g>
      <g transform="translate(-100 -40)"><rect x="-9" y="-9" width="18" height="18" rx="4" fill="url(#mono)"/><rect x="-9" y="-9" width="18" height="9" rx="4" fill="url(#gloss)"/></g>
      <g transform="translate(-60 -90)"><rect x="-8" y="-8" width="16" height="16" rx="4" fill="url(#mono)"/><rect x="-8" y="-8" width="16" height="8" rx="4" fill="url(#gloss)"/><circle cx="0" cy="0" r="2.4" fill="#36A096"/></g>
      <g transform="translate(40 -100)"><rect x="-7" y="-7" width="14" height="14" rx="3.5" fill="url(#mono)"/><rect x="-7" y="-7" width="14" height="7" rx="3.5" fill="url(#gloss)"/></g>
    </g>
  </g>

  <!-- ============ Left: large emblem ============ -->
  <g transform="translate(74 95) scale(3.42)">
    <rect x="0" y="0" width="38" height="38" rx="9" fill="url(#frame)"/>
    <rect x="0" y="0" width="38" height="20" rx="9" fill="url(#gloss)"/>
    <rect x="3" y="3" width="32" height="32" rx="6.5" fill="url(#panel)"/>
    <g fill="url(#mono)">
      <rect x="9" y="9.5" width="20" height="4.6" rx="1.4"/>
      <rect x="16.7" y="9.5" width="4.6" height="18.5" rx="1.4"/>
    </g>
    <rect x="13.5" y="30" width="11" height="2.1" rx="1.05" fill="url(#patina)"/>
  </g>

  <!-- ============ Center: wordmark + tagline ============ -->
  <g>
    <text x="232" y="160"
      font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
      font-size="78" font-weight="700" letter-spacing="-2"
      fill="url(#word)">Talos</text>
    <circle cx="455" cy="148" r="7" fill="url(#patina)"/>

    <!-- Patina rule, echoing the emblem inlay -->
    <rect x="234" y="182" width="120" height="3" rx="1.5" fill="url(#patina)"/>

    <text x="234" y="214"
      font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
      font-size="20" font-weight="600" letter-spacing="0.2"
      fill="#E2C79A">Modular TypeScript framework, built on Bun</text>
    <text x="234" y="244"
      font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
      font-size="15" font-weight="500" letter-spacing="0.4"
      fill="#8C7350">60+ independent packages &#183; Spec-Driven Development</text>
  </g>

  <!-- Corner rivets on the cast-bronze plate -->
  <g fill="url(#mono)" opacity="0.75">
    <circle cx="22" cy="22" r="3"/>
    <circle cx="878" cy="22" r="3"/>
    <circle cx="22" cy="298" r="3"/>
    <circle cx="878" cy="298" r="3"/>
  </g>
</svg>
