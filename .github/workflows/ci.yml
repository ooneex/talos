name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 2 * * 1" # Run Renovate every Monday at 2am UTC
  workflow_dispatch:
    # Allow manual triggering of Renovate

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write
  checks: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Cache dependencies and monorepo task cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            var/cache/monorepo
          key: ${{ runner.os }}-talos-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-talos-
      - run: bun run check

  renovate-config-validator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate Renovate config
        uses: rinchsan/renovate-config-validator@v0.2.0
        with:
          pattern: "renovate.json"

  renovate:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v46.1.8
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: info
