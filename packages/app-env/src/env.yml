# Application settings
app:
  # APP_ENV - local, development, staging, testing, test, qa, uat, integration, preview, demo, sandbox, beta, canary, hotfix, production
  env: "local"
  # HOST_NAME - default: 0.0.0.0
  host: ""
  # PORT - default: 3000
  port: 3000

# Logging configuration
logs:
  # LOGS_DATABASE_URL
  database_url: ""
  # https://logs.betterstack.com
  betterstack:
    # BETTERSTACK_LOGGER_SOURCE_TOKEN
    source_token: ""
    # BETTERSTACK_LOGGER_INGESTING_HOST
    ingesting_host: ""

# Exception reporting
exception:
  # https://logs.betterstack.com
  betterstack:
    # BETTERSTACK_EXCEPTION_LOGGER_APPLICATION_TOKEN
    application_token: ""
    # BETTERSTACK_EXCEPTION_LOGGER_INGESTING_HOST
    ingesting_host: ""

# Analytics and telemetry
analytics:
  # https://posthog.com
  posthog:
    # ANALYTICS_POSTHOG_PROJECT_TOKEN
    project_token: ""
    # ANALYTICS_POSTHOG_HOST - e.g. https://app.posthog.com or https://eu.posthog.com
    host: "https://eu.i.posthog.com"

# Caching layer
cache:
  redis:
    # CACHE_REDIS_URL
    url: "{{CACHE_REDIS_URL}}"
  # https://console.upstash.com
  upstash:
    # CACHE_UPSTASH_REDIS_REST_URL
    rest_url: ""
    # CACHE_UPSTASH_REDIS_REST_TOKEN
    rest_token: ""

# Pub/Sub messaging
pubsub:
  redis:
    # PUBSUB_REDIS_URL
    url: "{{PUBSUB_REDIS_URL}}"

# Rate limiting
rate_limit:
  redis:
    # RATE_LIMIT_REDIS_URL
    url: "{{RATE_LIMIT_REDIS_URL}}"
  # https://console.upstash.com
  upstash:
    # RATE_LIMIT_UPSTASH_REDIS_URL
    url: ""
    # RATE_LIMIT_UPSTASH_REDIS_TOKEN
    token: ""

# Queue
queue:
  redis:
    # QUEUE_REDIS_URL
    url: "{{QUEUE_REDIS_URL}}"

# Cross-Origin Resource Sharing
cors:
  # CORS_ORIGINS - comma-separated list
  origins: ""
  # CORS_METHODS - comma-separated list
  methods: ""
  # CORS_HEADERS - comma-separated list
  headers: ""
  # CORS_EXPOSED_HEADERS - comma-separated list
  exposed_headers: ""
  # CORS_CREDENTIALS - true or false
  credentials: ""
  # CORS_MAX_AGE - seconds
  max_age: ""

# File storage providers
storage:
  # https://dash.cloudflare.com - R2 object storage
  cloudflare:
    # STORAGE_CLOUDFLARE_ACCESS_KEY
    access_key: ""
    # STORAGE_CLOUDFLARE_SECRET_KEY
    secret_key: ""
    # STORAGE_CLOUDFLARE_ENDPOINT
    endpoint: ""
    # STORAGE_CLOUDFLARE_REGION
    region: "EEUR"
  # https://bunny.net
  bunny:
    # STORAGE_BUNNY_ACCESS_KEY
    access_key: ""
    # STORAGE_BUNNY_STORAGE_ZONE
    storage_zone: ""
    # STORAGE_BUNNY_REGION
    region: "de"
  filesystem:
    # FILESYSTEM_STORAGE_PATH
    path: ""

# Database connections
database:
  # DATABASE_URL
  url: "{{DATABASE_URL}}"
  redis:
    # DATABASE_REDIS_URL
    url: "{{DATABASE_REDIS_URL}}"
  sqlite:
    # SQLITE_DATABASE_PATH
    path: ""

# Email sending
mailer:
  sender:
    # MAILER_SENDER_NAME
    name: ""
    # MAILER_SENDER_ADDRESS
    address: ""
  # https://resend.com
  resend:
    # RESEND_API_KEY
    api_key: ""

# JSON Web Token
jwt:
  # JWT_SECRET
  secret: ""

# AI providers
ai:
  # https://openrouter.ai
  openrouter:
    # OPENROUTER_API_KEY
    api_key: ""
  # https://platform.openai.com
  openai:
    # OPENAI_API_KEY
    api_key: ""
  # https://console.anthropic.com
  anthropic:
    # ANTHROPIC_API_KEY
    api_key: ""
  # https://aistudio.google.com
  gemini:
    # GEMINI_API_KEY
    api_key: ""
  # https://console.groq.com
  groq:
    # GROQ_API_KEY
    api_key: ""
  # https://ollama.ai - default: http://localhost:11434
  ollama:
    # OLLAMA_HOST
    host: ""

# Payment processing
payment:
  # https://polar.sh
  polar:
    # POLAR_ACCESS_TOKEN
    access_token: ""
    # POLAR_ENVIRONMENT - sandbox or production
    environment: ""

# Authentication providers
authentication:
  # AUTH_TOKEN
  auth_token: ""
  # https://dashboard.clerk.com
  clerk:
    # CLERK_SECRET_KEY
    secret_key: ""

# Project management - https://linear.app/settings/api
linear:
  # LINEAR_API_KEY
  api_key: ""
  # LINEAR_TEAM_ID
  team_id: ""

# Web search
search:
  # https://dashboard.exa.ai/api-keys
  exa:
    # SEARCH_EXA_API_KEY
    api_key: ""
  # https://www.firecrawl.dev/app/api-keys
  firecrawl:
    # SEARCH_FIRECRAWL_API_KEY
    api_key: ""
  # https://www.ncbi.nlm.nih.gov/account/settings/ - optional, raises the rate limit
  pubmed:
    # SEARCH_PUBMED_API_KEY
    api_key: ""
  # https://brightdata.com/cp/setting/users - SERP API (https://brightdata.com/cp/learn_more/serp-api)
  brightdata:
    # SEARCH_BRIGHTDATA_API_KEY
    api_key: ""
    # SEARCH_BRIGHTDATA_SERP_ZONE - optional, auto-created when omitted
    serp_zone: ""

# Access control - comma-separated email addresses or identifiers
allowed_users:
  # DEVELOPMENT_ALLOWED_USERS
  development: ""
  # STAGING_ALLOWED_USERS
  staging: ""
  # TESTING_ALLOWED_USERS
  testing: ""
  # TEST_ALLOWED_USERS
  test: ""
  # QA_ALLOWED_USERS
  qa: ""
  # UAT_ALLOWED_USERS
  uat: ""
  # INTEGRATION_ALLOWED_USERS
  integration: ""
  # PREVIEW_ALLOWED_USERS
  preview: ""
  # DEMO_ALLOWED_USERS
  demo: ""
  # SANDBOX_ALLOWED_USERS
  sandbox: ""
  # BETA_ALLOWED_USERS
  beta: ""
  # CANARY_ALLOWED_USERS
  canary: ""
  # HOTFIX_ALLOWED_USERS
  hotfix: ""
  # SYSTEM_USERS
  system: ""
  # SUPER_ADMIN_USERS
  super_admin: ""
  # ADMIN_USERS
  admin: ""
